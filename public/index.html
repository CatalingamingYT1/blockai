<!doctype html>
<html lang="en" class="dark"> <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlockAI - Premium AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --sidebar-bg: #202123;
            --chat-bg: #343541;
            --input-bg: #40414f;
        }
        .dark body { background-color: #343541; color: white; }
        .sidebar { width: 260px; background: #202123; transition: transform 0.3s ease; }
        .message-user { background: #343541; }
        .message-assistant { background: #444654; }
        pre { background: #000; padding: 10px; border-radius: 5px; position: relative; overflow-x: auto; }
        .copy-btn { position: absolute; top: 5px; right: 5px; font-size: 10px; background: #555; padding: 2px 5px; cursor: pointer; }
        @media (max-width: 768px) {
            .sidebar { position: absolute; z-index: 50; transform: translateX(-100%); height: 100%; }
            .sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside id="sidebar" class="sidebar flex-shrink-0 flex flex-col p-2 text-white">
        <button id="new-chat-btn" class="border border-white/20 p-3 rounded-md hover:bg-white/10 mb-4 text-left">+ New Chat</button>
        <div id="chat-list" class="flex-1 overflow-y-auto space-y-2">
            </div>
        <div class="mt-auto border-t border-white/20 pt-2">
            <button id="toggle-dark" class="w-full text-left p-2 hover:bg-white/10 rounded">🌓 Toggle Mode</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative h-full">
        <div class="md:hidden p-4 border-b border-white/20 flex justify-between items-center">
            <button id="menu-toggle">☰</button>
            <h1 class="font-bold">BlockAI</h1>
            <div></div>
        </div>

        <div class="hidden md:flex justify-center items-center h-24 bg-gray-900 border-b border-white/10 text-xs text-gray-500">
            [ PLACE 728x90 ADSTERRA BANNER HERE ]
        </div>

        <div id="chat-window" class="flex-1 overflow-y-auto">
            <div id="welcome-screen" class="flex flex-col items-center justify-center h-full p-6 text-center">
                <h1 class="text-4xl font-bold mb-8 text-blue-500">BlockAI</h1>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-2xl">
                    <button onclick="startSpecific('Help me with homework')" class="p-4 bg-white/5 border border-white/10 rounded-lg hover:bg-white/10">📚 Help me with homework</button>
                    <button onclick="startSpecific('Help with my code')" class="p-4 bg-white/5 border border-white/10 rounded-lg hover:bg-white/10">💻 Help with my code</button>
                    <button onclick="startSpecific('Write a story')" class="p-4 bg-white/5 border border-white/10 rounded-lg hover:bg-white/10">📝 Write a story</button>
                    <button onclick="startSpecific('Explain Quantum Physics')" class="p-4 bg-white/5 border border-white/10 rounded-lg hover:bg-white/10">💡 Explain complex topics</button>
                </div>
            </div>
            <div id="messages-container" class="hidden flex flex-col"></div>
        </div>

        <div class="md:hidden flex justify-center h-12 bg-gray-900 text-[8px] text-gray-600">
            [ PLACE 320x50 MOBILE AD HERE ]
        </div>

        <div class="p-4 border-t border-white/10">
            <div class="max-w-3xl mx-auto relative flex items-center bg-[#40414f] rounded-xl p-2 shadow-xl">
                <textarea id="user-input" rows="1" class="w-full bg-transparent border-none text-white focus:outline-none p-2 resize-none" placeholder="Message BlockAI..."></textarea>
                <button id="send-btn" class="p-2 bg-blue-600 rounded-lg hover:bg-blue-700">➜</button>
            </div>
            <p class="text-[10px] text-center mt-2 text-gray-400">BlockAI can make mistakes. Verify important info.</p>
        </div>
    </main>

    <script src="chat.js"></script>
</body>
</html>
