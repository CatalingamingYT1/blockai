<!doctype html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlockAI | Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #212121; color: #e3e3e3; }
        .sidebar { background-color: #171717; width: 260px; transition: all 0.3s ease; }
        .chat-bubble-ai { background-color: transparent; border: 1px solid #333; border-radius: 15px; }
        .chat-bubble-user { background-color: #2f2f2f; border-radius: 15px; }
        .katex-display { margin: 1em 0; padding: 10px; background: #2a2a2a; border-radius: 8px; overflow-x: auto; }
        pre { background: #0d0d0d !important; padding: 16px; border-radius: 10px; margin: 10px 0; position: relative; border: 1px solid #333; }
        code { color: #569cd6; font-family: 'Consolas', monospace; }
        .copy-btn { position: absolute; top: 8px; right: 8px; background: #333; color: #fff; font-size: 10px; padding: 4px 8px; border-radius: 5px; opacity: 0; transition: 0.2s; }
        pre:hover .copy-btn { opacity: 1; }
        /* Scrollbar subtil */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        .input-area { background: #2f2f2f; border: 1px solid #444; border-radius: 20px; transition: border 0.2s; }
        .input-area:focus-within { border-color: #666; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar hidden md:flex flex-col p-4">
        <button id="new-chat-btn" class="flex items-center justify-center gap-2 p-3 bg-[#2f2f2f] rounded-lg hover:bg-[#3f3f3f] transition font-semibold text-sm">
            <span class="text-xl">+</span> New Chat
        </button>
        <div id="history" class="mt-6 flex-1 overflow-y-auto space-y-2">
            </div>
        <div class="p-4 border-t border-gray-800 text-[10px] text-gray-500 uppercase tracking-widest text-center">
            BlockAI Premium
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative h-full">
        
        <div class="hidden md:flex justify-center p-2 bg-[#171717] border-b border-[#333]">
            <div class="w-[728px] h-[90px] bg-[#222] border border-dashed border-[#444] flex items-center justify-center text-[10px] text-gray-600">
                [ PASTE ADSTERRA BANNER HERE ]
            </div>
        </div>

        <div id="chat-window" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
            <div id="welcome" class="flex flex-col items-center justify-center h-full text-center">
                <h1 class="text-5xl font-bold mb-4 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">BlockAI</h1>
                <p class="text-gray-400 mb-12">How can I help your studies today?</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-2xl">
                    <button onclick="fastStart('Help me with math: calculate (1/2) + (3/4)')" class="p-4 bg-[#2f2f2f] rounded-2xl border border-[#444] hover:border-blue-500 transition text-left text-sm">
                        <span class="block font-bold mb-1">📚 Math Homework</span>
                        "Explain fractions like 1/1 step by step"
                    </button>
                    <button onclick="fastStart('Create a 5-question Quiz about Science')" class="p-4 bg-[#2f2f2f] rounded-2xl border border-[#444] hover:border-purple-500 transition text-left text-sm">
                        <span class="block font-bold mb-1">🧠 Practice Quiz</span>
                        "Test my knowledge for the exam"
                    </button>
                </div>
            </div>
            <div id="msg-render" class="max-w-3xl mx-auto space-y-6"></div>
        </div>

        <div class="p-4 bg-transparent">
            <div class="max-w-3xl mx-auto">
                <div class="input-area p-2 flex items-end gap-2 shadow-2xl">
                    <textarea id="user-input" rows="1" class="flex-1 bg-transparent border-none text-white p-2 focus:outline-none resize-none max-h-48" placeholder="Ask BlockAI..."></textarea>
                    <button id="send-btn" class="p-2 bg-white text-black rounded-full hover:bg-gray-200 transition">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                    </button>
                </div>
                
                <div class="md:hidden mt-4 flex justify-center">
                    <div class="w-[320px] h-[50px] bg-[#222] border border-dashed border-[#444] flex items-center justify-center text-[8px] text-gray-600">
                        [ MOBILE AD HERE ]
                    </div>
                </div>

                <p class="text-center text-[10px] text-gray-500 mt-3">BlockAI V1.2. Designed for students.</p>
            </div>
        </div>
    </main>

    <script src="chat.js"></script>
</body>
</html>
