<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>BlockAI - Free Next-Gen Artificial Intelligence</title>
		<style>
			:root {
				--primary-color: #2563eb; /* Modern Blue */
				--primary-hover: #1d4ed8;
				--light-bg: #f3f4f6;
				--border-color: #d1d5db;
				--text-color: #111827;
				--text-light: #6b7280;
				--user-msg-bg: #dbeafe;
				--assistant-msg-bg: #ffffff;
			}

			* { box-sizing: border-box; margin: 0; padding: 0; }

			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
				line-height: 1.6;
				color: var(--text-color);
				background-color: #f9fafb;
				max-width: 900px;
				margin: 0 auto;
				padding: 1rem;
			}

			header {
				text-align: center;
				margin-bottom: 1.5rem;
				padding: 1rem 0;
				border-bottom: 3px solid var(--primary-color);
			}

			h1 { font-size: 2.2rem; color: var(--primary-color); letter-spacing: -1px; }

			.ad-container {
				background: #ebebeb;
				margin: 15px 0;
				min-height: 90px;
				display: flex;
				align-items: center;
				justify-content: center;
				border-radius: 8px;
				border: 1px dashed #bbb;
				font-size: 11px;
				color: #777;
				text-transform: uppercase;
			}

			.chat-container {
				display: flex;
				flex-direction: column;
				height: calc(100vh - 380px);
				min-height: 450px;
				border: 1px solid var(--border-color);
				border-radius: 12px;
				overflow: hidden;
				background: white;
				box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
			}

			.chat-messages {
				flex: 1;
				overflow-y: auto;
				padding: 1.5rem;
				background-color: var(--light-bg);
			}

			.message {
				margin-bottom: 1.2rem;
				padding: 1rem;
				border-radius: 12px;
				max-width: 85%;
				position: relative;
			}

			.user-message { background-color: var(--user-msg-bg); align-self: flex-end; margin-left: auto; border-bottom-right-radius: 2px; }
			.assistant-message { background-color: var(--assistant-msg-bg); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #e5e7eb; }

			.message-input { display: flex; padding: 1.2rem; background: white; border-top: 1px solid var(--border-color); }
			#user-input { flex: 1; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: 8px; resize: none; font-size: 1rem; outline: none; }
			#user-input:focus { border-color: var(--primary-color); }

			#send-button { margin-left: 0.8rem; padding: 0 1.5rem; background: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
			#send-button:hover { background: var(--primary-hover); }
			#send-button:disabled { background: #9ca3af; cursor: not-allowed; }

			.typing-indicator { display: none; font-style: italic; color: var(--text-light); padding: 0.5rem 1.5rem; font-size: 0.9rem; }
			.typing-indicator.visible { display: block; }

			footer { margin-top: 2rem; text-align: center; color: var(--text-light); font-size: 0.85rem; }
		</style>
	</head>
	<body>
		<header>
			<h1>BlockAI</h1>
			<p>Next-Generation Artificial Intelligence</p>
		</header>

		<div class="ad-container" id="ad-top">
			ADVERTISING SPACE (728x90)
		</div>

		<div class="chat-container">
			<div id="chat-messages" class="chat-messages">
				<div class="message assistant-message">
					<p>Hello! I am BlockAI. How can I assist you today?</p>
				</div>
			</div>
			<div class="typing-indicator" id="typing-indicator">BlockAI is typing...</div>
			<div class="message-input">
				<textarea id="user-input" placeholder="Ask BlockAI anything..." rows="1"></textarea>
				<button id="send-button">Send</button>
			</div>
		</div>

		<div class="ad-container" id="ad-bottom">
			PROMOTED CONTENT
		</div>

		<footer>
			<p>&copy; 2026 BlockAI Project. Developed by Cătălin. All rights reserved.</p>
		</footer>

		<script src="chat.js"></script>
	</body>
</html>
